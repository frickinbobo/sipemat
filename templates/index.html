<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="{{ url_for('static', filename='js/tailwind/tailwind.js') }}"></script>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/daisyui/daisyui.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/daisyui/daisyui-theme.css') }}"
    />
    <title>SIPEMAT</title>
    <style>
      aside {
        padding-left: 0.75rem;
        padding-right: 0.75rem;
      }

      .nav-item {
        display: flex;
        align-items: center;
        width: 100%;
        padding: 1rem 0.75rem 1rem 1.25rem;
        justify-content: flex-start;
        cursor: pointer;
        position: relative;
        transition: background-color 0.3s ease;
      }

      .nav-icon {
        width: 1.5rem;
        height: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        margin-left: -0.25rem;
      }

      .sidebar-label {
        white-space: nowrap;
        transition: opacity 0.2s ease, width 0.2s ease;
      }

      .nav-item:hover {
        background-color: #374151;
      }

      .collapsed aside {
        padding-left: 0 !important;
        padding-right: 0 !important;
      }

      .collapsed .nav-item {
        justify-content: center !important;
        padding-left: 0 !important;
        padding-right: 0 !important;
      }

      .collapsed .nav-icon {
        margin-left: 0 !important;
      }

      .collapsed .sidebar-label {
        opacity: 0;
        width: 0;
        overflow: hidden;
        margin-left: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body class="bg-gray-100 min-h-screen">
    <header
      class="fixed top-0 left-0 w-full z-30 bg-orange-600 text-white p-6 flex items-center shadow"
    >
      <button
        id="toggleSidebar"
        class="text-2xl mr-4 focus:outline-none cursor-pointer"
      >
        ☰
      </button>
      <h1 class="text-xl font-semibold">SIPEMAT</h1>
    </header>

    <div class="pt-16 flex">
      <aside
        id="sidebar"
        class="bg-gray-800 text-white transition-all duration-300 min-h-[calc(100vh-80px)] fixed md:relative top-16 md:top-0 left-0 z-20 w-64 md:flex-shrink-0 overflow-hidden flex flex-col space-y-2 py-4 mt-4"
      >
        <a
          href="#"
          class="nav-item text-md font-medium hover:bg-gray-700 rounded-lg"
        >
          <div class="nav-icon">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="size-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"
              />
            </svg>
          </div>
          <span class="sidebar-label ml-2">Dashboard</span>
        </a>
        <div
          tabindex="0"
          class="collapse collapse-arrow bg-gray-800 text-white hover:bg-gray-700 rounded"
        >
          <input type="checkbox" id="accordion-menu" />
          <div
            class="collapse-title text-md font-medium flex items-center gap-2"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="size-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25"
              />
            </svg>
            <span class="sidebar-label">Kartu Bimbingan</span>
          </div>
          <div class="collapse-content ml-8">
            <a
              href="/kartu-bimbingan/kartu-putih/"
              class="block py-1 hover:bg-gray-700"
              >Kartu Putih</a
            >
            <a
              href="/kartu-bimbingan/kartu-kuning/"
              class="block py-1 hover:bg-gray-700"
              >Kartu Kuning</a
            >
          </div>
        </div>

        <!-- Accordion 2 -->
        <div
          tabindex="0"
          class="collapse collapse-arrow bg-gray-800 text-white hover:bg-gray-700 rounded"
        >
          <input type="checkbox" id="accordion-menu" />
          <div
            class="collapse-title text-md font-medium flex items-center gap-2"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="size-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"
              />
            </svg>
            <span class="sidebar-label">Surat - Surat</span>
          </div>
          <div class="collapse-content ml-8">
            <a href="#" class="block py-1 hover:underline"
              >Surat Keterangan Kuliah</a
            >
            <a href="#" class="block py-1 hover:underline"
              >Surat Izin Penelitian</a
            >
          </div>
        </div>
      </aside>

      <div id="overlay" class="fixed inset-0 z-10 hidden md:hidden"></div>

      <main id="mainContent" class="p-6 transition-all duration-300 w-full">
        {% block content %} {% endblock %}
      </main>
    </div>

    <script>
      const toggleBtn = document.getElementById("toggleSidebar");
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("overlay");
      const mainContent = document.getElementById("mainContent");
      const labels = sidebar.querySelectorAll(".sidebar-label");
      const collapses = sidebar.querySelectorAll(".collapse");
      const accordionMenus = sidebar.querySelectorAll("#accordion-menu");

      let isCollapsed = false;

      collapses.forEach((collapse) => {
        collapse.addEventListener("click", () => {
          console.log(isCollapsed);
          if (isCollapsed) {
            isCollapsed = !isCollapsed;
            sidebar.classList.remove("w-20");
            sidebar.classList.add("w-64");
            sidebar.classList.remove("collapsed");
            labels.forEach((label) => (label.style.opacity = "1"));
            // sidebar.addEventListener("transitionend", function handler(e) {
            //   if (e.propertyName === "width") {
            //     sidebar.classList.remove("collapsed");
            //     labels.forEach((label) => (label.style.opacity = "1"));
            //     sidebar.removeEventListener("transitionend", handler);
            //   }
            // });
          }
        });
      });

      toggleBtn.addEventListener("click", () => {
        if (window.innerWidth >= 768) {
          isCollapsed = !isCollapsed;

          if (!isCollapsed) {
            labels.forEach((label) => (label.style.opacity = "1"));
            sidebar.classList.remove("collapsed");
            sidebar.classList.remove("w-20");
            sidebar.classList.add("w-64");
          } else {
            accordionMenus.forEach((menu) => (menu.checked = false));
            sidebar.classList.remove("w-64");
            sidebar.classList.add("w-20");

            sidebar.addEventListener("transitionend", function handler(e) {
              if (e.propertyName === "width") {
                sidebar.classList.add("collapsed");
                labels.forEach((label) => (label.style.opacity = "0"));
                sidebar.removeEventListener("transitionend", handler);
              }
            });
          }
        } else {
          sidebar.classList.toggle("-translate-x-64");
          overlay.classList.toggle("hidden");
        }
      });

      overlay.addEventListener("click", () => {
        sidebar.classList.add("-translate-x-64");
        overlay.classList.add("hidden");
      });

      if (window.innerWidth < 768) {
        sidebar.classList.add("-translate-x-64");
      }
    </script>
    {% block script %} {% endblock %}
  </body>
</html>
