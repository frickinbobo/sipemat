<script>
  function findIndexByField(data, field, query) {
    return data.findIndex((item) => {
      const value = item[field].toString();
      if (typeof value === "string") {
        return value.toLowerCase().includes(query.toLowerCase());
      }
      return value === query;
    });
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@6.4.6/dist/fuse.min.js"></script>
<script type="module">
  import { initializeAutocomplete } from "/static/js/autocomplete/autocomplete.js";
  const nim = document.getElementById("nim");
  const nama = document.getElementById("nama");
  const pembimbing1 = document.getElementById("pembimbing-1");
  const pembimbing2 = document.getElementById("pembimbing-2");
  const prodi = document.getElementById("prodi");
  let mahasiswa = [];
  let dosen = [];

  prodi.addEventListener("change", (event) => {
    console.log(event.target.value);
    initializeAutocomplete(
      pembimbing1,
      dosen
        .filter((item) => item.prodi === event.target.value)
        .map((item) => item.nama.toString()),
      (selectedOption) => {
        console.log("Selected option:", selectedOption);
      }
    );
    initializeAutocomplete(
      pembimbing2,
      dosen
        .filter((item) => item.prodi === event.target.value)
        .map((item) => item.nama.toString()),
      (selectedOption) => {
        console.log("Selected option:", selectedOption);
      }
    );
  });

  fetch("/api/get/mahasiswa/")
    .then((response) => {
      if (!response.ok) {
        throw new Error("Network response was not ok");
      }
      return response.json(); // Parse JSON response
    })
    .then((data) => {
      mahasiswa = data;
      initializeAutocomplete(
        nim,
        data.map((item) => item.nim.toString()),
        (selectedOption) => {
          console.log("Selected option:", selectedOption);
          let index = findIndexByField(data, "nim", selectedOption);
          nama.value = data[index].nama;
          prodi.value = data[index].prodi;
          prodi.dispatchEvent(new Event("change"));
        }
      );
      initializeAutocomplete(
        nama,
        data.map((item) => item.nama.toString()),
        (selectedOption) => {
          console.log("Selected option:", selectedOption);
          let index = findIndexByField(data, "nama", selectedOption);
          nim.value = data[index].nim;
          prodi.value = data[index].prodi;
          prodi.dispatchEvent(new Event("change"));
        }
      );
    })
    .catch((error) => {
      console.error("Fetch error:", error);
      console.log("There was an error fetching the data.");
    });

  fetch("/api/get/dosen/")
    .then((response) => {
      if (!response.ok) {
        throw new Error("Network response was not ok");
      }
      return response.json(); // Parse JSON response
    })
    .then((data) => {
      initializeAutocomplete(
        pembimbing1,
        data.map((item) => item.nama.toString()),
        (selectedOption) => {
          console.log("Selected option:", selectedOption);
        }
      );
      initializeAutocomplete(
        pembimbing2,
        data.map((item) => item.nama.toString()),
        (selectedOption) => {
          console.log("Selected option:", selectedOption);
        }
      );
      dosen = data;
    })
    .catch((error) => {
      console.error("Fetch error:", error);
      console.log("There was an error fetching the data.");
    });
</script>

<script>
  function getRomanMonth(dateString) {
    const romanMonths = [
      "I",
      "II",
      "III",
      "IV",
      "V",
      "VI",
      "VII",
      "VIII",
      "IX",
      "X",
      "XI",
      "XII",
    ];

    const month = new Date(dateString).getMonth(); // getMonth() returns 0-11
    return romanMonths[month];
  }
  function getYearFromDate(dateString) {
    const date = new Date(dateString);
    return date.getFullYear();
  }
  function formatIndonesianDate(dateString) {
    const days = [
      "Minggu",
      "Senin",
      "Selasa",
      "Rabu",
      "Kamis",
      "Jumat",
      "Sabtu",
    ];
    const months = [
      "Januari",
      "Februari",
      "Maret",
      "April",
      "Mei",
      "Juni",
      "Juli",
      "Agustus",
      "September",
      "Oktober",
      "November",
      "Desember",
    ];

    const date = new Date(dateString);
    const dayName = days[date.getDay()];
    const day = date.getDate();
    const monthName = months[date.getMonth()];
    const year = date.getFullYear();

    return `${dayName}, ${day} ${monthName} ${year}`;
  }
</script>
