<div class="form-control">
  <label for="autocomplete" class="label">
    <span class="label-text">Search Options</span>
  </label>
  <div class="relative">
    <!-- Input with padding for the clear button -->
    <input
      type="text"
      id="autocomplete"
      class="input input-bordered w-full pr-10"
      placeholder="Search..."
      autocomplete="off"
    />

    <!-- Clear button positioned inside the input -->
    <button
      id="clearButton"
      class="absolute right-2 top-1/2 transform -translate-y-1/2 text-gray-500 hidden"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-5 w-5"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M6 18L18 6M6 6l12 12"
        />
      </svg>
    </button>

    <!-- Suggestions dropdown -->
    <ul
      id="suggestions"
      class="absolute w-full mt-2 bg-white border border-gray-300 rounded-md shadow-lg max-h-60 overflow-auto z-10 hidden"
    ></ul>
  </div>
</div>
<div class="relative overflow-x-auto w-full shadow-md sm:rounded-lg">
  <!-- Search and Filter Controls -->
  <div class="mb-4 flex justify-between">
    <input
      id="searchInput"
      type="text"
      placeholder="Search..."
      class="input input-bordered w-48"
    />
    <select id="filterCategory" class="select select-bordered w-48">
      <option value="">All Categories</option>
      <!-- Categories will be populated dynamically -->
    </select>
  </div>

  <!-- Table Structure -->
  <table id="dataTable" class="table w-full table-zebra">
    <thead id="tableHeader" class="text-lg bg-primary text-white">
      <!-- Table headers will be generated dynamically -->
    </thead>
    <tbody id="tableBody">
      <!-- Data rows will go here -->
    </tbody>
  </table>
</div>
{% endblock %} {% block script %}

<script src="https://cdn.jsdelivr.net/npm/fuse.js@6.4.6/dist/fuse.min.js"></script>

<script>
  // Your list of options
  const options = [
    "Apple",
    "Banana",
    "Cherry",
    "Date",
    "Fig",
    "Grape",
    "Honeydew",
    "Kiwi",
    "Lemon",
    "Mango",
  ];

  // Fuse.js options
  const fuse = new Fuse(options, {
    includeScore: true,
    threshold: 0.3, // Adjust this for more or less fuzzy searching
  });

  const input = document.getElementById("autocomplete");
  const clearButton = document.getElementById("clearButton");
  const suggestionsList = document.getElementById("suggestions");
  let highlightedIndex = -1;
  let filteredOptions = [];

  // Fuzzy search function using Fuse.js
  function fuzzySearch(query) {
    if (query) {
      return fuse.search(query).map((result) => result.item);
    }
    return [];
  }

  // Display options
  function displayOptions(options) {
    suggestionsList.innerHTML = ""; // Clear previous suggestions
    options.forEach((option, index) => {
      const optionElement = document.createElement("li");
      optionElement.textContent = option;
      optionElement.classList.add("p-2", "cursor-pointer", "hover:bg-gray-200");

      if (highlightedIndex === index) {
        optionElement.classList.add("bg-blue-500", "text-white"); // Highlighted option
      }

      optionElement.addEventListener("click", () => {
        selectOption(index);
      });

      suggestionsList.appendChild(optionElement);
    });

    suggestionsList.classList.toggle("hidden", options.length === 0);
  }

  // Select option by index
  function selectOption(index) {
    input.value = filteredOptions[index];
    suggestionsList.classList.add("hidden");
  }

  // Handle input event
  input.addEventListener("input", () => {
    const query = input.value.trim();

    if (query) {
      filteredOptions = fuzzySearch(query);
      highlightedIndex = 0; // Reset to first option
      displayOptions(filteredOptions);
      clearButton.classList.remove("hidden");
    } else {
      filteredOptions = [];
      highlightedIndex = -1;
      displayOptions(filteredOptions);
      clearButton.classList.add("hidden");
    }
  });

  // Handle keydown for Enter, Tab, and Arrow keys
  input.addEventListener("keydown", (event) => {
    if (event.key === "ArrowDown") {
      // Move down the list
      if (highlightedIndex < filteredOptions.length - 1) {
        highlightedIndex++;
        displayOptions(filteredOptions);
      }
    } else if (event.key === "ArrowUp") {
      // Move up the list
      if (highlightedIndex > 0) {
        highlightedIndex--;
        displayOptions(filteredOptions);
      }
    } else if (event.key === "Enter" || event.key === "Tab") {
      // Select highlighted option
      if (highlightedIndex >= 0) {
        selectOption(highlightedIndex);
      }
    }
  });

  // Clear input when the clear button is clicked
  clearButton.addEventListener("click", () => {
    input.value = "";
    filteredOptions = [];
    highlightedIndex = -1;
    displayOptions(filteredOptions);
    clearButton.classList.add("hidden");
    input.focus();
  });

  input.addEventListener("keydown", (event) => {
    if (event.key === "Escape") {
      // Close suggestions if Esc is pressed
      suggestionsList.classList.add("hidden");
    }
  });
</script>
